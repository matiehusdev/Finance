<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #c8f562;
    --accent2: #5c8aff;
    --red: #ff5c5c;
    --text: #e8eaf0;
    --muted: #6b7394;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LOGIN ───────────────────────────────────────── */
  #login-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    gap: 32px;
  }

  .login-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2.6rem;
    letter-spacing: -1px;
  }
  .login-logo span { color: var(--accent); }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    width: min(380px, 90vw);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .login-box label {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
  }

  .login-box input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-box input[type="password"]:focus { border-color: var(--accent); }

  .login-btn {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }

  .login-error {
    color: var(--red);
    font-size: 0.85rem;
    text-align: center;
    min-height: 18px;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ── APP ─────────────────────────────────────────── */
  #app { display: none; }

  header {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(13,15,20,0.85);
    backdrop-filter: blur(16px);
    z-index: 10;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
  }
  .logo span { color: var(--accent); }

  .month-switcher {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
  }

  .month-switcher button {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1.1rem; padding: 0 4px;
    transition: color 0.2s;
  }
  .month-switcher button:hover { color: var(--accent); }

  #current-month {
    font-size: 0.9rem;
    font-weight: 500;
    min-width: 110px;
    text-align: center;
  }

  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* ── CARDS ───────────────────────────────────────── */
  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover { border-color: var(--border); transform: translateY(-2px); }

  .card-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card-value {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    letter-spacing: -1px;
    line-height: 1;
  }

  .card-sub {
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .card-accent { color: var(--accent); }
  .card-red { color: var(--red); }
  .card-blue { color: var(--accent2); }

  .card-dot {
    position: absolute;
    top: 20px; right: 20px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .card-dot.red { background: var(--red); }
  .card-dot.blue { background: var(--accent2); }

  /* ── GRID ────────────────────────────────────────── */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 800px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    header { padding: 16px; }
    main { padding: 20px 12px 48px; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .panel-title {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* ── BAR CHART CATEGORIAS ────────────────────────── */
  .cat-bar { margin-bottom: 14px; }

  .cat-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    margin-bottom: 6px;
  }

  .cat-name { color: var(--text); font-weight: 500; }
  .cat-val { color: var(--muted); }

  .cat-track {
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .cat-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent);
    transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
  }

  /* ── TABELA ──────────────────────────────────────── */
  .trans-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  .trans-table th {
    text-align: left;
    padding: 0 12px 12px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .trans-table td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .trans-table tr:last-child td { border-bottom: none; }
  .trans-table tr:hover td { background: var(--surface2); }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 0.74rem;
    font-weight: 600;
  }

  .badge-rec { background: rgba(200,245,98,0.1); color: var(--accent); }
  .badge-desp { background: rgba(255,92,92,0.1); color: var(--red); }

  .amount-rec { color: var(--accent); font-weight: 600; }
  .amount-desp { color: var(--red); font-weight: 600; }

  .trans-scroll { max-height: 460px; overflow-y: auto; }
  .trans-scroll::-webkit-scrollbar { width: 4px; }
  .trans-scroll::-webkit-scrollbar-track { background: transparent; }
  .trans-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── CANVAS ──────────────────────────────────────── */
  .chart-wrap { position: relative; height: 220px; }

  /* ── DONUT INFO ──────────────────────────────────── */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .donut-chart { position: relative; width: 160px; height: 160px; flex-shrink: 0; }

  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 10px; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-name { color: var(--muted); flex: 1; }
  .legend-pct { font-weight: 600; }

  /* ── ANIMAÇÃO DE ENTRADA ─────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .anim { animation: fadeUp 0.5s ease both; }
  .anim:nth-child(2) { animation-delay: 0.05s; }
  .anim:nth-child(3) { animation-delay: 0.1s; }
  .anim:nth-child(4) { animation-delay: 0.15s; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">Minhas <span>Finanças</span></div>
  <div class="login-box">
    <div>
      <label>Senha</label>
      <input type="password" id="pwd-input" placeholder="••••••••" autofocus>
    </div>
    <button class="login-btn" onclick="tryLogin()">Entrar</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">Minhas <span>Finanças</span></div>
    <div class="month-switcher">
      <button onclick="prevMonth()">&#8592;</button>
      <span id="current-month"></span>
      <button onclick="nextMonth()">&#8594;</button>
    </div>
  </header>

  <main>
    <div class="cards-row" id="cards-row"></div>

    <div class="grid-2">
      <div class="panel anim">
        <div class="panel-title">Receitas vs Despesas — Histórico</div>
        <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
      </div>
      <div class="panel anim">
        <div class="panel-title">Despesas por categoria</div>
        <div id="cat-bars"></div>
      </div>
    </div>

    <div class="grid-3">
      <div class="panel anim">
        <div class="panel-title">Transações do mês</div>
        <div class="trans-scroll">
          <table class="trans-table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Categoria</th>
                <th>Descrição</th>
                <th>Tipo</th>
                <th style="text-align:right">Valor</th>
              </tr>
            </thead>
            <tbody id="trans-tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="panel anim">
        <div class="panel-title">Composição das despesas</div>
        <div class="donut-wrap" style="flex-direction:column;gap:16px">
          <div class="donut-chart"><canvas id="donut-chart"></canvas></div>
          <div class="donut-legend" id="donut-legend"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ── CONFIGURAÇÃO ─────────────────────────────────────────────
// Após publicar o Apps Script, cole a URL aqui:
const API_URL = 'https://script.google.com/macros/s/AKfycbx_apoXhdrvIXHkdeKTvkSHbop6kVumzqbuTwIFge0RdVQcrT-ng9u9dS459zeg2hPk/exec';

// ── DADOS (carregados via API) ──
let TRANSACTIONS = [];

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CAT_COLORS = ['#c8f562','#5c8aff','#ff5c5c','#ffb347','#a78bfa','#34d399','#fb7185','#38bdf8','#fbbf24','#f472b6','#4ade80','#e879f9'];

// ── AUTH ─────────────────────────────────────────────────────
// Para trocar a senha, edite apenas a linha abaixo:
const SENHA = 'fin@2026';

function tryLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === SENHA) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    const err = document.getElementById('login-err');
    err.textContent = 'Senha incorreta.';
    err.style.animation = 'none';
    requestAnimationFrame(() => err.style.animation = 'shake 0.3s ease');
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

// ── APP LOGIC ─────────────────────────────────────────────────
let currentYear = 2026;
let currentMonth = 3; // March
let barChartInstance = null;
let donutChartInstance = null;

function getAllMonths() {
  return [...new Set(TRANSACTIONS.map(t => t.DATA.slice(0,7)))].sort();
}

function getMonthData(year, month) {
  const key = `${year}-${String(month).padStart(2,'0')}`;
  return TRANSACTIONS.filter(t => t.DATA.startsWith(key));
}

function fmt(n) {
  return 'R$ ' + n.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function fmtDate(str) {
  const [y,m,d] = str.split('-');
  return `${d}/${m}`;
}

function updateMonthDisplay() {
  document.getElementById('current-month').textContent =
    `${MONTHS_PT[currentMonth-1]} ${currentYear}`;
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  renderDashboard();
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  renderDashboard();
}

function renderCards(data) {
  const receitas = data.filter(t => t.TIPO === 'Receita').reduce((s,t) => s + t.VALOR, 0);
  const despesas = data.filter(t => t.TIPO === 'Despesa').reduce((s,t) => s + t.VALOR, 0);
  const balanco = receitas - despesas;
  const ntrans = data.length;

  const balSign = balanco >= 0 ? 'card-accent' : 'card-red';

  document.getElementById('cards-row').innerHTML = `
    <div class="card anim">
      <div class="card-dot"></div>
      <div class="card-label">Receitas</div>
      <div class="card-value card-accent">${fmt(receitas)}</div>
      <div class="card-sub">Entradas no mês</div>
    </div>
    <div class="card anim">
      <div class="card-dot red"></div>
      <div class="card-label">Despesas</div>
      <div class="card-value card-red">${fmt(despesas)}</div>
      <div class="card-sub">Saídas no mês</div>
    </div>
    <div class="card anim">
      <div class="card-dot blue"></div>
      <div class="card-label">Balanço</div>
      <div class="card-value ${balSign}">${fmt(balanco)}</div>
      <div class="card-sub">${balanco >= 0 ? 'Positivo ✓' : 'Negativo ✗'}</div>
    </div>
    <div class="card anim">
      <div class="card-dot" style="background:var(--accent2)"></div>
      <div class="card-label">Transações</div>
      <div class="card-value card-blue">${ntrans}</div>
      <div class="card-sub">lançamentos registrados</div>
    </div>
  `;
}

function renderBarChart() {
  const ctx = document.getElementById('bar-chart').getContext('2d');
  if (barChartInstance) barChartInstance.destroy();

  const allMonths = getAllMonths();
  const labels = allMonths.map(m => {
    const [y, mo] = m.split('-');
    return `${MONTHS_PT[+mo-1].slice(0,3)} ${y}`;
  });

  const receitas = allMonths.map(m => {
    const [y,mo] = m.split('-');
    return getMonthData(+y,+mo).filter(t=>t.TIPO==='Receita').reduce((s,t)=>s+t.VALOR,0);
  });
  const despesas = allMonths.map(m => {
    const [y,mo] = m.split('-');
    return getMonthData(+y,+mo).filter(t=>t.TIPO==='Despesa').reduce((s,t)=>s+t.VALOR,0);
  });

  barChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Receitas', data: receitas, backgroundColor: 'rgba(200,245,98,0.75)', borderRadius: 6 },
        { label: 'Despesas', data: despesas, backgroundColor: 'rgba(255,92,92,0.65)', borderRadius: 6 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#6b7394', font: { family:'DM Sans', size:12 } } } },
      scales: {
        x: { ticks: { color:'#6b7394' }, grid: { color:'#252a38' } },
        y: { ticks: { color:'#6b7394', callback: v => 'R$'+v }, grid: { color:'#252a38' } }
      }
    }
  });
}

function renderCatBars(data) {
  const despesas = data.filter(t => t.TIPO === 'Despesa');
  const total = despesas.reduce((s,t) => s+t.VALOR, 0);
  const bycat = {};
  despesas.forEach(t => { bycat[t.CATEGORIA] = (bycat[t.CATEGORIA]||0) + t.VALOR; });
  const sorted = Object.entries(bycat).sort((a,b) => b[1]-a[1]).slice(0,8);
  const max = sorted[0]?.[1] || 1;

  document.getElementById('cat-bars').innerHTML = sorted.map(([cat, val]) => `
    <div class="cat-bar">
      <div class="cat-header">
        <span class="cat-name">${cat}</span>
        <span class="cat-val">${fmt(val)}</span>
      </div>
      <div class="cat-track">
        <div class="cat-fill" style="width:${(val/max*100).toFixed(1)}%"></div>
      </div>
    </div>
  `).join('');
}

function renderTransTable(data) {
  const sorted = [...data].sort((a,b) => b.DATA.localeCompare(a.DATA));
  document.getElementById('trans-tbody').innerHTML = sorted.map(t => `
    <tr>
      <td style="color:var(--muted)">${fmtDate(t.DATA)}</td>
      <td>${t.CATEGORIA}</td>
      <td style="color:var(--muted);font-size:0.82rem">${t.DESCRIÇÃO}</td>
      <td><span class="badge ${t.TIPO==='Receita'?'badge-rec':'badge-desp'}">${t.TIPO}</span></td>
      <td style="text-align:right" class="${t.TIPO==='Receita'?'amount-rec':'amount-desp'}">${t.TIPO==='Receita'?'+':'-'}${fmt(t.VALOR)}</td>
    </tr>
  `).join('');
}

function renderDonut(data) {
  const ctx = document.getElementById('donut-chart').getContext('2d');
  if (donutChartInstance) donutChartInstance.destroy();

  const despesas = data.filter(t=>t.TIPO==='Despesa');
  const bycat = {};
  despesas.forEach(t => { bycat[t.CATEGORIA] = (bycat[t.CATEGORIA]||0) + t.VALOR; });
  const sorted = Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const total = sorted.reduce((s,[,v])=>s+v,0);

  donutChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sorted.map(([k])=>k),
      datasets: [{ data: sorted.map(([,v])=>v), backgroundColor: CAT_COLORS, borderWidth: 0, hoverOffset: 6 }]
    },
    options: {
      cutout: '72%',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } }
    }
  });

  document.getElementById('donut-legend').innerHTML = sorted.map(([cat,val],i) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${CAT_COLORS[i]}"></div>
      <span class="legend-name">${cat}</span>
      <span class="legend-pct" style="color:${CAT_COLORS[i]}">${(val/total*100).toFixed(0)}%</span>
    </div>
  `).join('');
}

function renderDashboard() {
  updateMonthDisplay();
  const data = getMonthData(currentYear, currentMonth);
  renderCards(data);
  renderBarChart();
  renderCatBars(data);
  renderTransTable(data);
  renderDonut(data);
}

function showLoading(msg) {
  document.getElementById('cards-row').innerHTML =
    `<div style="color:var(--muted);font-size:0.9rem;padding:8px 0;grid-column:1/-1">${msg}</div>`;
}

function fetchFromSheets() {
  return new Promise((resolve) => {
    if (!API_URL || API_URL === 'COLE_AQUI_SUA_URL') { resolve(false); return; }

    showLoading('🔄 Sincronizando com o Google Sheets...');

    const callbackName = '_gsCallback_' + Date.now();
    const script = document.createElement('script');
    let settled = false;

    const cleanup = () => { try { document.head.removeChild(script); } catch(e){} delete window[callbackName]; };

    window[callbackName] = (json) => {
      settled = true;
      cleanup();
      if (json && json.transactions && json.transactions.length > 0) {
        TRANSACTIONS = json.transactions;
        const months = [...new Set(TRANSACTIONS.map(t => t.DATA.slice(0,7)))].sort();
        const last = months[months.length - 1];
        if (last) { currentYear = +last.slice(0,4); currentMonth = +last.slice(5,7); }
        resolve(true);
      } else {
        resolve(false);
      }
    };

    // timeout de 8s
    setTimeout(() => { if (!settled) { cleanup(); resolve(false); } }, 8000);

    const url = API_URL + (API_URL.includes('?') ? '&' : '?') + 'callback=' + callbackName + '&t=' + Date.now();
    script.src = url;
    document.head.appendChild(script);
  });
}

async function initApp() {
  const ok = await fetchFromSheets();
  if (!ok) {
    document.getElementById('cards-row').innerHTML = `
      <div style="color:var(--red);font-size:0.9rem;padding:8px 0;grid-column:1/-1">
        ⚠️ Não foi possível carregar os dados do Google Sheets. Verifique a URL da API ou tente recarregar a página.
      </div>`;
    return;
  }
  renderDashboard();
}
